<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Webpage</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #0077cc;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
        }

        .hero p {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background: white;
            color: #0077cc;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            color: white;
        }

        section {
            padding: 50px 20px;
            text-align: center;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h2>My Website</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<div class="hero">
    <h1>Welcome to My Website</h1>
    <p>Create beautiful websites using HTML, CSS, and JavaScript.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<section id="about">
    <h2>About</h2>
    <p>This is a simple responsive webpage template.</p>
</section>

<section id="services">
    <h2>Services</h2>
    <p>Web Design • Development • UI/UX</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
</section>

<footer>
    <p>&copy; 2026 My Website. All Rights Reserved.</p>
</footer>

<script>
    function showMessage() {
        alert("Thank you for visiting our website!");
    }
</script>

</body>
</html>
